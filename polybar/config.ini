[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/bar]
height = 24pt
bottom = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-color = #00000000
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = monospace:size=12;2
font-1 = "3270NerdFontMono-Regular:style=Regular:size=24;5"
modules-left = xworkspaces xwindow
modules-right = filesystem battery pulseaudio xkeyboard memory cpu wlan eth date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = DISK %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
interval = 1
full-at = 100
low-at = 15
label-charging = %{T2}%{T-} %percentage%%
label-discharging = %{T2}%{T-} %percentage%%
label-full = %{T2}%{T-} %percentage%%
format-low = <label-low>
label-low = %{T2}%{T-} %percentage%%
label-low-foreground = #FF0000

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = " "
format-volume = <label-volume>
label-volume = %percentage%%
label-muted =  muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
label = %percentage:2%%

[network-base]
type = internal/network
interval = 1
format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#00FF00}W%{F-}: (%signal%% at %essid%)
label-disconnected = %{F#FF0000}W%{F-}: down

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#00FF00}E%{F-}: %local_ip% (%linkspeed%)
label-disconnected = %{F#FF0000}E%{F-}: down

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d %H:%M:%S
label = %date%

[settings]
screenchange-reload = true
pseudo-transparency = true
